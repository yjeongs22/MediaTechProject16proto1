kind = "web"
previewPath = "/"
title = "PlanPick"
version = "1.0.0"
id = "artifacts/planpick"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20338

[services.development]
run = "pnpm --filter @workspace/planpick run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/planpick", "run", "build" ]
publicDir = "artifacts/planpick/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20338"
BASE_PATH = "/"
